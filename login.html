<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Administrativo | Candela Prime</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C9A84C;
            --gold-light: #E8C97A;
            --dark: #1A1208;
            --brown: #5C3D1E;
            --cream: #FAF6EE;
            --warm-white: #FEFCF7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Jost', sans-serif;
            background: linear-gradient(135deg, #1A1208 0%, #3D2308 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--cream);
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 24px;
            border: 1px solid rgba(201, 168, 76, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            color: var(--gold-light);
            margin-bottom: 30px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        h2 {
            font-size: 18px;
            font-weight: 300;
            margin-bottom: 30px;
            letter-spacing: 1px;
            color: rgba(250, 246, 238, 0.6);
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: var(--gold);
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(201, 168, 76, 0.3);
            padding: 14px 18px;
            border-radius: 8px;
            color: #fff;
            font-family: 'Jost', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--gold-light);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(201, 168, 76, 0.2);
        }

        .btn-login {
            width: 100%;
            background: var(--gold);
            color: var(--dark);
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: var(--gold-light);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(201, 168, 76, 0.3);
        }

        .error-msg {
            color: #ff6b6b;
            font-size: 12px;
            margin-top: 15px;
            display: none;
        }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            font-size: 12px;
            color: rgba(250, 246, 238, 0.4);
            text-decoration: none;
            transition: 0.3s;
        }

        .back-link:hover { color: var(--gold); }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">Candela Prime</div>
        <h2>Panel de Control</h2>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" id="email" required placeholder="admin@candelaprime.shop">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-login">Ingresar Sistema</button>
            <div id="error" class="error-msg">Credenciales incorrectas. Intente de nuevo.</div>
        </form>

        <a href="index.html" class="back-link">← Volver al sitio</a>
    </div>

    <script>
        const validEmail = "agenciacandelaia@gmail.com";
        const validPass = "Candela69521_";

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const error = document.getElementById('error');

            if(email === validEmail && pass === validPass) {
                // Store auth state
                sessionStorage.setItem('isAdmin', 'true');
                window.location.href = 'dashboard.html';
            } else {
                error.style.display = 'block';
                setTimeout(() => { error.style.display = 'none'; }, 3000);
            }
        });
    </script>
</body>
</html>
